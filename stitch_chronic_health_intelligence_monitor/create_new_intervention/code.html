<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Intervention - MedCore Monitor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;family=Public+Sans:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#191b22",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434653",
                        "on-primary-fixed": "#001945",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e1e2eb",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-primary-container": "#bcceff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-error-container": "#93000a",
                        "primary": "#003c90",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ffc0a7",
                        "on-tertiary-fixed": "#360f00",
                        "surface-container": "#ededf6",
                        "surface-bright": "#faf8ff",
                        "surface-variant": "#e1e2eb",
                        "surface-tint": "#1d59c1",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-container-high": "#e7e7f1",
                        "secondary-container": "#d0e1fb",
                        "on-secondary-container": "#54647a",
                        "tertiary": "#732900",
                        "secondary-fixed": "#d3e4fe",
                        "background": "#faf8ff",
                        "primary-container": "#0f52ba",
                        "outline-variant": "#c3c6d5",
                        "inverse-primary": "#b0c6ff",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9d9e2",
                        "outline": "#737784",
                        "surface-container-low": "#f3f3fc",
                        "secondary": "#505f76",
                        "inverse-on-surface": "#f0f0f9",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d9e2ff",
                        "tertiary-fixed": "#ffdbcd",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3037",
                        "on-primary-fixed-variant": "#00419c",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#993900",
                        "on-surface": "#191b22",
                        "surface": "#faf8ff",
                        "on-secondary-fixed": "#0b1c30"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "display": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Public Sans"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .label-text { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface h-screen flex items-center justify-center p-4">
<!-- Windows Frame Container -->
<div class="w-full max-w-5xl h-[870px] bg-surface-container-lowest rounded-xl shadow-2xl flex flex-col overflow-hidden border border-surface-variant">
<!-- Windows Title Bar -->
<div class="h-10 bg-surface-container flex items-center justify-between px-4 select-none border-b border-surface-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary">medical_services</span>
<span class="text-xs font-body text-on-surface-variant">MedCore Monitor</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant hover:text-on-surface cursor-pointer">minimize</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant hover:text-on-surface cursor-pointer">check_box_outline_blank</span>
<span class="material-symbols-outlined text-[18px] text-on-surface-variant hover:text-error cursor-pointer">close</span>
</div>
</div>
<div class="flex flex-1 overflow-hidden">
<!-- Side Nav (Suppressed for transactional intent as per "Semantic Shell" Mandate, but requested by user prompt implicitly via MedCore Monitor context? The prompt asks for a 'New Intervention' screen. It's a task-focused creation screen. Therefore, hide global nav.) -->
<!-- Navigation Suppressed for Task-Focused Intent -->
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto bg-background p-8">
<div class="max-w-3xl mx-auto">
<!-- Header -->
<div class="mb-8">
<div class="flex items-center gap-3 text-sm text-on-surface-variant mb-2">
<span class="material-symbols-outlined text-[20px] cursor-pointer hover:text-primary transition-colors">arrow_back</span>
<span class="font-body">Back to Dashboard</span>
</div>
<h1 class="text-3xl font-headline font-bold text-primary-fixed-variant tracking-tight">Create New Medical Intervention</h1>
<p class="text-on-surface-variant mt-2 font-body">Complete the required fields below to initiate a new patient intervention protocol.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
<form class="space-y-6">
<!-- Grid Layout for Top Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Intervention Type -->
<div class="space-y-2">
<label class="label-text text-xs font-semibold text-on-surface tracking-wider uppercase">Intervention Type</label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-outline-variant rounded text-on-surface py-2.5 pl-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body text-sm transition-all shadow-sm">
<option disabled="" selected="" value="">Select intervention type...</option>
<option value="med">Medication Adjustment</option>
<option value="lab">Lab Order</option>
<option value="pt">Physical Therapy</option>
<option value="ref">Specialist Referral</option>
<option value="img">Diagnostic Imaging</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Patient Selection -->
<div class="space-y-2">
<label class="label-text text-xs font-semibold text-on-surface tracking-wider uppercase">Patient Selection</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">search</span>
</span>
<input class="w-full bg-surface border border-outline-variant rounded text-on-surface py-2.5 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body text-sm transition-all shadow-sm" placeholder="Search patient ID or name..." type="text"/>
</div>
</div>
<!-- Assigned Personnel -->
<div class="space-y-2 md:col-span-2">
<label class="label-text text-xs font-semibold text-on-surface tracking-wider uppercase">Assigned Personnel</label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-outline-variant rounded text-on-surface py-2.5 pl-3 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body text-sm transition-all shadow-sm">
<option disabled="" selected="" value="">Assign to doctor, nurse, or team...</option>
<option value="dr_smith">Dr. Sarah Smith (Cardiology)</option>
<option value="dr_jones">Dr. Marcus Jones (Neurology)</option>
<option value="rn_davis">Nurse Emily Davis (ICU)</option>
<option value="team_alpha">Rapid Response Team Alpha</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">group</span>
</div>
</div>
</div>
</div>
<hr class="border-surface-variant my-6"/>
<!-- Urgency Level -->
<div class="space-y-3">
<label class="label-text text-xs font-semibold text-on-surface tracking-wider uppercase">Urgency Level</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<label class="relative flex cursor-pointer rounded border border-outline-variant bg-surface p-4 focus:outline-none hover:bg-surface-container-high transition-colors">
<input checked="" class="sr-only peer" name="urgency" type="radio" value="low"/>
<span class="peer-checked:border-primary peer-checked:bg-primary-container/10 absolute inset-0 rounded border-2 border-transparent transition-all"></span>
<div class="flex w-full items-center justify-between z-10">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-secondary"></div>
<span class="font-body text-sm font-medium text-on-surface">Low</span>
</div>
</div>
</label>
<label class="relative flex cursor-pointer rounded border border-outline-variant bg-surface p-4 focus:outline-none hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="urgency" type="radio" value="medium"/>
<span class="peer-checked:border-tertiary peer-checked:bg-tertiary-container/10 absolute inset-0 rounded border-2 border-transparent transition-all"></span>
<div class="flex w-full items-center justify-between z-10">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-tertiary-fixed-dim"></div>
<span class="font-body text-sm font-medium text-on-surface">Medium</span>
</div>
</div>
</label>
<label class="relative flex cursor-pointer rounded border border-outline-variant bg-surface p-4 focus:outline-none hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="urgency" type="radio" value="high"/>
<span class="peer-checked:border-error peer-checked:bg-error-container/20 absolute inset-0 rounded border-2 border-transparent transition-all"></span>
<div class="flex w-full items-center justify-between z-10">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-error"></div>
<span class="font-body text-sm font-medium text-on-surface">High</span>
</div>
</div>
</label>
<label class="relative flex cursor-pointer rounded border border-outline-variant bg-surface p-4 focus:outline-none hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="urgency" type="radio" value="critical"/>
<span class="peer-checked:border-error peer-checked:bg-error/10 absolute inset-0 rounded border-2 border-transparent transition-all"></span>
<div class="flex w-full items-center justify-between z-10">
<div class="flex items-center gap-2 animate-pulse">
<span class="material-symbols-outlined text-[16px] text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-body text-sm font-bold text-error">Critical</span>
</div>
</div>
</label>
</div>
</div>
<!-- Clinical Notes -->
<div class="space-y-2 pt-2">
<label class="label-text text-xs font-semibold text-on-surface tracking-wider uppercase flex justify-between">
<span>Clinical Notes &amp; Instructions</span>
<span class="text-on-surface-variant font-normal">Optional</span>
</label>
<textarea class="w-full bg-surface border border-outline-variant rounded text-on-surface p-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body text-sm transition-all shadow-sm resize-y" placeholder="Provide detailed instructions, clinical rationale, or specific protocols to follow..." rows="5"></textarea>
</div>
<!-- Action Buttons -->
<div class="pt-6 flex items-center justify-end gap-4 border-t border-surface-variant">
<button class="px-6 py-2.5 rounded font-body text-sm font-medium text-on-surface-variant bg-transparent border border-outline-variant hover:bg-surface-container-high transition-colors" type="button">
                                    Cancel
                                </button>
<button class="px-6 py-2.5 rounded font-body text-sm font-medium text-on-primary bg-primary-container hover:bg-primary transition-colors shadow-sm flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">add_circle</span>
                                    Create Intervention
                                </button>
</div>
</form>
</div>
</div>
</main>
</div>
</div>
</body></html>
